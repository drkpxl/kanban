# Tag definitions for the Kanban board.
#
# Each tag needs three fields:
#   slug  — unique, URL-safe identifier (lowercase, hyphens ok, no spaces)
#   label — display name shown in the UI
#   color — any CSS hex color used for the pill background
#
# Copy this file to tags.yaml (or edit tags.yaml directly) and restart the
# server for changes to take effect.

tags:
  - slug: design
    label: Design
    color: "#c17f3f"
  - slug: writing
    label: Writing
    color: "#4a7c59"
  - slug: research
    label: Research
    color: "#6b5a8f"
  - slug: code
    label: Code
    color: "#3f7fc1"
  - slug: urgent
    label: Urgent
    color: "#c13f3f"
