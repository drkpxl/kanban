<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
		<meta name="text-scale" content="scale" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
		<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Mono:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet" />
		<script>
			(function() {
				try {
					var vars = JSON.parse(localStorage.getItem('theme-vars') || 'null');
					if (vars) {
						var root = document.documentElement;
						Object.keys(vars).forEach(function(k) { root.style.setProperty(k, vars[k]); });
					}
				} catch (e) {}
				// Queue keyboard shortcuts fired before Svelte hydrates
				window.__pendingShortcut = null;
				document.addEventListener('keydown', function(e) {
					if (window.__shortcutsReady) return;
					var t = e.target;
					if (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable) return;
					if (e.key === 'n') { e.preventDefault(); window.__pendingShortcut = 'n'; }
				});
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
